<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Customizer</title>
    <link rel="stylesheet" href="css/alwb.css">
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: #fdfdfd;
            font-family: sans-serif;
        }

        .input-label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div id="custom-controls-container">
        <div id="section-jurisdiction" class="sc-control-group" style="margin-bottom: 20px;">
            <label class="input-label">Jurisdiction</label>
            <select id="jurisdiction-select" class="sc-input-select" onchange="updateEntityDropdown()"
                style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="">-- Select Jurisdiction --</option>
                <option value="goa">Greek Orthodox Archdiocese of America</option>
                <option value="oca">Orthodox Church in America</option>
                <option value="ant">Antiochian Archdiocese</option>
            </select>
        </div>

        <div id="section-entity" class="sc-control-group"
            style="margin-bottom: 25px; display: none; padding-bottom: 15px; border-bottom: 1px dotted #ccc;">
            <label class="input-label" id="entity-label">Diocese / Metropolis</label>
            <select id="entity-select" class="sc-input-select" onchange="applyOverrides()"
                style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
            </select>
        </div>

        <div class="sc-control-group">
            <label class="input-label">Service Category (Required)</label>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="btn-standard" type="button" class="sc-btn-toggle"
                    onclick="setServiceCategory('standard')">Standard</button>
                <button id="btn-hli" type="button" class="sc-btn-toggle"
                    onclick="setServiceCategory('hierarchical')">Hierarchical</button>
            </div>
        </div>
    </div>

    <div id="section-ordination" class="sc-control-group"
        style="display: none; border-top: 1px solid #ccc; padding-top: 20px;">

        <div class="ordination-grid">

            <div class="ordination-col">
                <div class="checkbox-row">
                    <input type="checkbox" id="ord-deacon-check" onchange="applyOverrides()">
                    <label for="ord-deacon-check" class="input-label" style="margin-bottom:0;">Deacon Ordination</label>
                </div>

                <div id="deacon-name-fields" class="name-field-group" style="display: flex;">
                    <div>
                        <input type="text" id="deacon-name-gr-acc" class="sc-input-text"
                            placeholder="Name in Greek accusative" oninput="applyOverrides()">
                    </div>
                    <div>
                        <input type="text" id="deacon-name-gr-gen" class="sc-input-text"
                            placeholder="Name in Greek genitive" oninput="applyOverrides()">
                    </div>
                    <div>
                        <input type="text" id="deacon-name-en" class="sc-input-text" placeholder="Name in English"
                            oninput="applyOverrides()">
                    </div>
                </div>
            </div>

            <div class="ordination-col">
                <div class="checkbox-row">
                    <input type="checkbox" id="ord-priest-check" onchange="applyOverrides()">
                    <label for="ord-priest-check" class="input-label" style="margin-bottom:0;">Priest Ordination</label>
                </div>

                <div id="priest-name-fields" class="name-field-group" style="display: flex;">
                    <div>
                        <input type="text" id="priest-name-gr-acc" class="sc-input-text"
                            placeholder="Name in Greek accusative" oninput="applyOverrides()">

                    <div>
                        <input type="text" id="priest-name-gr-gen" class="sc-input-text"
                            placeholder="Name in Greek genitive" oninput="applyOverrides()">

                    <div>
                        <input type="text" id="priest-name-en" class="sc-input-text" placeholder="Name in English"
                            oninput="applyOverrides()">
                    </div>
                </div>
            </div>

        </div>
    </div>

    /**
     * Updates the second dropdown based on the first selection
     */
   function updateEntityDropdown() {
        const jurisSelect = document.getElementById('jurisdiction-select');
        const entitySelect = document.getElementById('entity-select');
        const entitySection = document.getElementById('section-entity');
        const selectedJuris = jurisSelect.value;

        // Clear previous options
        entitySelect.innerHTML = '';

        if (selectedJuris && entityMapping[selectedJuris]) {
            // Show the section
            entitySection.style.display = 'block';

            // Populate options
            entityMapping[selectedJuris].forEach(item => {
                let opt = document.createElement('option');
                opt.value = item.value;
                opt.innerHTML = item.text;
                entitySelect.appendChild(opt);
            });
        } else {
            entitySection.style.display = 'none';
        }
    }
 
    function replaceEntityText() {
        const serviceFrame = window.parent.document.getElementById('FrameText');
        const serviceDoc = serviceFrame.contentDocument || serviceFrame.contentWindow.document;
        const $s = window.parent.jQuery(serviceDoc);

        for (const [entityId, mapping] of Object.entries(entityMapping)) {
            const inputElement = document.getElementById(entityId);

            if (inputElement) {
                const value = inputElement.value;

                mapping.classes.forEach(keyString => {
                    // We search for the specific data-key attribute in the service text.
                    // Using the 'contains' selector [*=] ensures we find the key even 
                    // if it has a prefix like 'gr_US_goa|' attached to it.
                    const target = $s.find(`[data-key*="${keyString}"]`);

                    if (target.length > 0) {
                        target.text(value);
                    }
                });
            }
        }
        console.log("Text replacement via data-key complete.");
    }

    function setServiceCategory(category) {
        console.log("Service Category selected: " + category);

        const btnStd = document.getElementById('btn-standard');
        const btnHli = document.getElementById('btn-hli');

        // 1. Swap the 'active' class (The Red Light)
        if (category === 'standard') {
            btnStd.classList.add('active');
            btnHli.classList.remove('active');
        } else if (category === 'hierarchical') {
            btnHli.classList.add('active');
            btnStd.classList.remove('active');
        }

        // 2. Immediately push the change to the service frame
        updateServiceVisibility(category);
    }

    function updateServiceVisibility(category) {
        const serviceFrame = window.parent.document.getElementById('FrameText');
        const serviceDoc = serviceFrame.contentDocument || serviceFrame.contentWindow.document;
        const $s = window.parent.jQuery(serviceDoc);
        const isHierarchical = (category === 'hierarchical');
        const ordSection = document.getElementById('section-ordination');
        if (ordSection) {
            ordSection.style.display = isHierarchical ? 'block' : 'none';
        }
        // 1. UI RESET & VISIBILITY: Handle the Panel Sidebar
        const deaconCheck = document.getElementById('ord-deacon-check');
        const priestCheck = document.getElementById('ord-priest-check');
        const deaconFields = document.getElementById('deacon-name-fields');
        const priestFields = document.getElementById('priest-name-fields');

        if (!isHierarchical) {
            // Force uncheck the boxes so no "hidden" ordination stays active
            if (deaconCheck) deaconCheck.checked = false;
            if (priestCheck) priestCheck.checked = false;

            // Hide the name input groups in the panel
            if (deaconFields) deaconFields.style.display = 'none';
            if (priestFields) priestFields.style.display = 'none';

            // Hide the entire ordination section/titles if you have a wrapper ID
            const ordSection = document.getElementById('ordination-section');
            if (ordSection) ordSection.style.display = 'none';
        } else {
            // Show the ordination section/titles in Hierarchical mode
            const ordSection = document.getElementById('ordination-section');
            if (ordSection) ordSection.style.display = 'block';

            // Ensure name fields match the current checkbox state
            if (deaconFields) deaconFields.style.display = deaconCheck.checked ? 'flex' : 'none';
            if (priestFields) priestFields.style.display = priestCheck.checked ? 'flex' : 'none';
        }

        // 2. CLEAN SLATE: Hide every row in the Service Frame containing any BCC/ECC pair
        $s.find('tr:has([class*="bcc_"])').each(function () {
            const bccClass = window.parent.jQuery(this).find('[class*="bcc_"]').attr('class').split(' ')[0];
            const eccClass = bccClass.replace('bcc_', 'ecc_');
            $s.find('tr:has(.' + bccClass + ')')
                .nextUntil('tr:has(.' + eccClass + ')')
                .addBack()
                .add($s.find('tr:has(.' + eccClass + ')'))
                .hide();
        });

        // 3. SERVICE VISIBILITY: Show the primary category (Standard vs Hierarchical)
        const prefix = isHierarchical ? 'hli_' : 'li_';
        $s.find('tr:has([class*="bcc_' + prefix + '"])').each(function () {
            const bccClass = window.parent.jQuery(this).find('[class*="bcc_' + prefix + '"]').attr('class').split(' ')[0];

            // Skip ordination blocks here; they are handled separately by checkboxes below
            if (bccClass.includes('ordination')) return;

            showBlock($s, bccClass.replace('bcc_', ''));
        });

        // 4. SUBSET VISIBILITY: Handle Ordination paragraphs in the Service Frame
        if (isHierarchical) {
            if (deaconCheck && deaconCheck.checked) {
                showBlock($s, 'hli_ordination_deacon');
            }
            if (priestCheck && priestCheck.checked) {
                showBlock($s, 'hli_ordination_priest');
            }
        }
    }

    /**
     * Helper function to show a specific BCC/ECC range
     */
    function showBlock($s, slug) {
        const bcc = 'bcc_' + slug;
        const ecc = 'ecc_' + slug;
        $s.find('tr:has(.' + bcc + ')')
            .nextUntil('tr:has(.' + ecc + ')')
            .addBack()
            .add($s.find('tr:has(.' + ecc + ')'))
            .show();
    }

    function applyOverrides() {
        // 1. SETUP THE FRAME ACCESS
        const serviceFrame = window.parent.document.getElementById('FrameText');
        if (!serviceFrame) return;
        const serviceDoc = serviceFrame.contentDocument || serviceFrame.contentWindow.document;
        const $s = window.parent.jQuery(serviceDoc);

        // 2. PART A: JURISDICTION TEXT REPLACEMENT
        const selectedID = document.getElementById('entity-select').value;
        if (selectedID && dioceseData[selectedID]) {
            const dataKeys = dioceseData[selectedID].keys;
            Object.keys(dataKeys).forEach(key => {
                const val = dataKeys[key];
                if (val !== "") {
                    $s.find(`[data-key="${key}"]`).text(val);
                }
            });
            console.log("Text replaced for: " + dioceseData[selectedID].label);
        }

        // 3. PART B: SERVICE CATEGORY VISIBILITY
        const isStd = document.getElementById('btn-standard').classList.contains('active');
        const isHli = document.getElementById('btn-hli').classList.contains('active');

        if (isStd || isHli) {
            const category = isStd ? 'standard' : 'hierarchical';
            updateServiceVisibility(category);
        }

        // 4. PART C: ORDINATION NAME REPLACEMENT (Independent of Jurisdiction)
        if (isHli) {
            ['deacon', 'priest'].forEach(role => {
                const config = ordinationMapping[role];
                const checkEl = document.getElementById(config.checkId);
                const isChecked = checkEl && checkEl.checked;

                config.fields.forEach(field => {
                    const inputEl = document.getElementById(field.inputId);
                    // If checked, use the input value (or underscores if empty). If unchecked, always underscores.
                    const finalVal = isChecked ? (inputEl.value || "_______") : "_______";

                    $s.find(`[data-key="${field.dataKey}"]`).text(finalVal);
                });
            });
        }
    }

    function resetCustomizerPanel() {
        console.log("Performing Full Factory Reset...");

        // 1. Reset Jurisdiction Dropdown to the placeholder (index 0)
        const jurisdictionSelect = document.getElementById('jurisdiction-select');
        if (jurisdictionSelect) {
            jurisdictionSelect.selectedIndex = 0;
        }

        // 2. RESET DIOCESE/METROPOLIS FIELD
        const metroSelect = document.getElementById('metropolis-select');
        if (metroSelect) {
            // Clear all previous options (GOA, OCA, etc.)
            metroSelect.innerHTML = '<option value="">-- Select Metropolis --</option>';
            // Lock it until a Jurisdiction is chosen again
            metroSelect.disabled = true;
            // Ensure the value is nulled
            metroSelect.value = "";
        }

        // 3. Deactivate ALL Service Category Buttons (Remove the "Red Light")
        const btnStd = document.getElementById('btn-standard');
        const btnHli = document.getElementById('btn-hli');
        if (btnStd) btnStd.classList.remove('active');
        if (btnHli) btnHli.classList.remove('active');

        // 4. Hide the entire Ordination Section in the panel
        const ordinationSection = document.getElementById('section-ordination');
        if (ordinationSection) ordinationSection.style.display = 'none';

        // 5. Uncheck Ordination Checkboxes & Hide their name input groups
        const dCheck = document.getElementById('ord-deacon-check');
        const pCheck = document.getElementById('ord-priest-check');
        if (dCheck) dCheck.checked = false;
        if (pCheck) pCheck.checked = false;

        const dFields = document.getElementById('deacon-name-fields');
        const pFields = document.getElementById('priest-name-fields');
        if (dFields) dFields.style.display = 'none';
        if (pFields) pFields.style.display = 'none';

        // 6. Wipe all text inputs (Metropolis custom name, Deacon/Priest names)
        const allInputs = document.querySelectorAll('.sc-input-text');
        allInputs.forEach(input => {
            input.value = "";
        });

        // 7. Synchronize the Service Frame (The Live View)
        // Hides all hierarchical and ordination content
        updateServiceVisibility('none');

        // Reverts all names in the service to "_______"
        updateOrdinandNames();

        // Runs your primary text replacement to clear Diocese/Bishop names
        if (typeof replaceEntityText === "function") {
            replaceEntityText();
        }

        console.log("Full System Reset Complete.");
    }

    </script>
